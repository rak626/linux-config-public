general.import = [
    # "~/.config/alacritty/themes/rose-pine.toml",
    # "~/.config/alacritty/themes/everforest.toml",
    "~/.config/alacritty/themes/rose-pine-moon.toml",
    "~/.config/alacritty/fonts.toml",
    "~/.config/alacritty/window.toml",
    "~/.config/alacritty/keybinds.toml",
]

[env]
TERM = "xterm-256color"

[terminal.shell]
program = "/bin/bash"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "On" }

[mouse]
hide_when_typing = true
